# Local development services for DiscoBall.
#
#   docker compose up -d db                 # just PostgreSQL (default)
#   docker compose --profile pdf up -d      # also start the PDF render service
#
services:
  db:
    image: postgres:16-alpine
    container_name: discoball-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: discoball
      POSTGRES_PASSWORD: discoball
      POSTGRES_DB: discoball
    ports:
      - "5432:5432"
    volumes:
      - discoball-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discoball -d discoball"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: headless LibreOffice for DOCX -> PDF conversion (Phase 3+).
  # Enable with the "pdf" profile; set PDF_RENDER_URL=http://localhost:3001 in .env
  pdf:
    image: gotenberg/gotenberg:8
    container_name: discoball-pdf
    restart: unless-stopped
    profiles: ["pdf"]
    ports:
      - "3001:3000"

volumes:
  discoball-pgdata:
